<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Metronome</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f6f7f9;
        color: #16181d;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2.5rem, 8vw, 5rem);
      }

      p {
        margin: 0;
        font-size: 1.125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, Metronome.</h1>
      <p>End-to-end website workflow test.</p>
    </main>
  </body>
</html>
