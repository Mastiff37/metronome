<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Metronome</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --ink: #17191f;
        --muted: #68707d;
        --line: #dfe3ea;
        --accent: #2471a3;
        --accent-strong: #155e88;
        --control: #f0f3f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 980px;
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 32px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 720;
        letter-spacing: 0;
      }

      .tempo-readout {
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-variant-numeric: tabular-nums;
      }

      .tempo-readout strong {
        font-size: 2rem;
        line-height: 1;
      }

      .tempo-readout span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      main {
        display: grid;
        grid-template-columns: minmax(600px, 1fr) 320px;
        gap: 24px;
        padding: 28px 32px 32px;
      }

      .notation-area,
      .controls {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .notation-area {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 480px;
      }

      .notation-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .notation-heading h2 {
        margin: 0;
        font-size: 1rem;
      }

      .notation-heading span {
        color: var(--muted);
        font-size: 0.9rem;
      }

      #notation {
        display: grid;
        min-height: 360px;
        padding: 26px 30px;
        place-items: center;
        position: relative;
      }

      #notation svg {
        max-width: 100%;
        overflow: visible;
      }

      .playhead-bar {
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
      }

      .playhead-bar.is-running {
        opacity: 1;
      }

      .controls {
        align-self: start;
        padding: 20px;
      }

      .control-group {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 650;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--control);
        color: var(--ink);
        padding: 0 12px;
      }

      input[type="range"] {
        height: 28px;
        padding: 0;
        accent-color: var(--accent);
      }

      .bpm-row {
        display: grid;
        grid-template-columns: 1fr 76px;
        gap: 10px;
        align-items: center;
      }

      .time-signature-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .start-button {
        width: 100%;
        height: 52px;
        margin-top: 4px;
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-weight: 760;
      }

      .start-button:hover {
        background: var(--accent-strong);
      }

      .start-button.is-running {
        background: #a3342b;
      }

      .status {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Metronome</h1>
        <div class="tempo-readout" aria-live="polite">
          <strong id="bpmDisplay">100</strong>
          <span>BPM</span>
        </div>
      </header>

      <main>
        <section class="notation-area" aria-labelledby="notationTitle">
          <div class="notation-heading">
            <h2 id="notationTitle">Click Pattern</h2>
            <span id="patternSummary">4/4, eighth notes</span>
          </div>
          <div id="notation" aria-label="Notation preview"></div>
        </section>

        <aside class="controls" aria-label="Metronome controls">
          <div class="control-group">
            <label for="bpmRange">Tempo</label>
            <div class="bpm-row">
              <input id="bpmRange" type="range" min="40" max="240" value="100">
              <input id="bpmInput" type="number" min="40" max="240" value="100">
            </div>
          </div>

          <div class="control-group">
            <label for="timeNumerator">Time Signature</label>
            <div class="time-signature-row">
              <input id="timeNumerator" type="number" min="2" max="32" value="4" aria-label="Time signature numerator">
              <select id="timeDenominator" aria-label="Time signature denominator">
                <option value="4" selected>4</option>
                <option value="8">8</option>
                <option value="16">16</option>
                <option value="32">32</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label for="tuplet">Tuple Type</label>
            <select id="tuplet">
              <option value="none" selected>None</option>
              <option value="3">Triplets</option>
            </select>
          </div>

          <div class="control-group">
            <label for="tupleValue">Tuple Value</label>
            <select id="tupleValue">
              <option value="q">Quarter notes</option>
              <option value="8" selected>Eighth notes</option>
              <option value="16">Sixteenth notes</option>
              <option value="32">Thirty-second notes</option>
            </select>
          </div>

          <div class="control-group">
            <label for="clickInterval">Click Interval</label>
            <select id="clickInterval">
              <option value="q">Quarter notes</option>
              <option value="8" selected>Eighth notes</option>
              <option value="16">Sixteenth notes</option>
              <option value="32">Thirty-second notes</option>
            </select>
          </div>

          <div class="control-group">
            <label for="clickGrid">Click Grid</label>
            <select id="clickGrid">
              <option value="nominal" selected>Nominal</option>
              <option value="tuple" disabled>Tuple</option>
            </select>
          </div>

          <button class="start-button" id="toggleButton" type="button">Start</button>
          <div class="status" id="status">Ready</div>
        </aside>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.6/build/cjs/vexflow.js"></script>
    <script>
      const bpmRange = document.querySelector("#bpmRange");
      const bpmInput = document.querySelector("#bpmInput");
      const bpmDisplay = document.querySelector("#bpmDisplay");
      const timeNumerator = document.querySelector("#timeNumerator");
      const timeDenominator = document.querySelector("#timeDenominator");
      const clickInterval = document.querySelector("#clickInterval");
      const tuplet = document.querySelector("#tuplet");
      const tupleValue = document.querySelector("#tupleValue");
      const clickGrid = document.querySelector("#clickGrid");
      const notation = document.querySelector("#notation");
      const patternSummary = document.querySelector("#patternSummary");
      const toggleButton = document.querySelector("#toggleButton");
      const status = document.querySelector("#status");

      let audioContext;
      let schedulerTimer;
      let animationFrame;
      let nextClickTime = 0;
      let clickIndex = 0;
      let isRunning = false;
      let measureStartTime = 0;
      let playhead = null;

      const intervalLabels = {
        q: "quarter notes",
        8: "eighth notes",
        16: "sixteenth notes",
        32: "thirty-second notes",
      };
      const maxDisplayedNotes = 64;

      function getVexFlow() {
        if (window.Vex && window.Vex.Flow) {
          return window.Vex.Flow;
        }

        if (window.VexFlow) {
          return window.VexFlow.Flow || window.VexFlow;
        }

        return null;
      }

      function clampBpm(value) {
        return Math.min(240, Math.max(40, Number.parseInt(value, 10) || 100));
      }

      function clampNumerator(value) {
        return Math.min(32, Math.max(2, Number.parseInt(value, 10) || 4));
      }

      function getTimeSignature() {
        return {
          beats: clampNumerator(timeNumerator.value),
          beatUnit: Number(timeDenominator.value),
        };
      }

      function getIntervalValue(duration) {
        return duration === "q" ? 4 : Number(duration);
      }

      function getMeasureUnits(beats, beatUnit) {
        return beats * (32 / beatUnit);
      }

      function getSelectedTuplet() {
        return tuplet.value === "none" ? null : Number(tuplet.value);
      }

      function getDurationUnits(duration, tupletValue = null) {
        const baseUnits = 32 / getIntervalValue(duration);
        return tupletValue ? baseUnits * (2 / tupletValue) : baseUnits;
      }

      function getDurationFromUnits(units) {
        const durationsByUnit = {
          8: "q",
          4: "8",
          2: "16",
          1: "32",
        };
        return durationsByUnit[units];
      }

      function getRemainderEvents(startUnits, remainderUnits) {
        const events = [];
        let currentUnits = startUnits;
        let remainingUnits = Math.round(remainderUnits);

        [8, 4, 2, 1].forEach((units) => {
          while (remainingUnits >= units) {
            events.push({
              duration: getDurationFromUnits(units),
              durationUnits: units,
              isNote: false,
              startUnits: currentUnits,
            });
            currentUnits += units;
            remainingUnits -= units;
          }
        });

        return events;
      }

      function getClickEvents(beats, beatUnit, duration, tupletValue) {
        const measureUnits = getMeasureUnits(beats, beatUnit);
        if (tupletValue) {
          const groupUnits = getDurationUnits(duration) * 2;
          const noteUnits = groupUnits / tupletValue;
          const groupCount = Math.floor(measureUnits / groupUnits);
          return Array.from({ length: groupCount * tupletValue }, (_, index) => {
            const groupIndex = Math.floor(index / tupletValue);
            const noteIndex = index % tupletValue;
            return {
              duration,
              durationUnits: noteUnits,
              isClick: true,
              startUnits: groupIndex * groupUnits + noteIndex * noteUnits,
            };
          });
        }

        const clickUnits = getDurationUnits(duration);
        const clickCount = Math.floor(measureUnits / clickUnits);
        return Array.from({ length: clickCount }, (_, index) => {
          return {
            duration,
            durationUnits: clickUnits,
            isClick: true,
            startUnits: index * clickUnits,
          };
        });
      }

      function getDisplayEvents(beats, beatUnit, duration, tupletValue) {
        const measureUnits = getMeasureUnits(beats, beatUnit);
        const groupUnits = tupletValue ? getDurationUnits(duration) * 2 : null;
        const noteUnits = tupletValue ? groupUnits / tupletValue : getDurationUnits(duration);
        const groupCount = tupletValue ? Math.floor(measureUnits / groupUnits) : null;
        const noteCount = tupletValue ? groupCount * tupletValue : Math.floor(measureUnits / noteUnits);
        const events = Array.from({ length: noteCount }, (_, index) => {
          const groupIndex = tupletValue ? Math.floor(index / tupletValue) : null;
          const tupletIndex = tupletValue ? index % tupletValue : null;
          return {
            duration,
            durationUnits: noteUnits,
            isNote: true,
            startUnits: tupletValue ? groupIndex * groupUnits + tupletIndex * noteUnits : index * noteUnits,
            tuplet: tupletValue,
            tupletGroup: groupIndex,
            tupletIndex,
          };
        });
        const usedUnits = tupletValue ? groupCount * groupUnits : noteCount * noteUnits;
        const remainderUnits = measureUnits - usedUnits;
        return events.concat(getRemainderEvents(usedUnits, remainderUnits));
      }

      function isUsableClickInterval(beats, beatUnit, duration) {
        const tupletValue = clickGrid.value === "tuple" ? getSelectedTuplet() : null;
        return getClickEvents(beats, beatUnit, duration, tupletValue).length > 0;
      }

      function isUsableTupleValue(beats, beatUnit, duration) {
        const events = getDisplayEvents(beats, beatUnit, duration, getSelectedTuplet());
        return events.some((event) => event.isNote) && events.length <= maxDisplayedNotes;
      }

      function syncTimeSignature() {
        timeNumerator.value = clampNumerator(timeNumerator.value);
        const tupleGridOption = clickGrid.querySelector('option[value="tuple"]');
        tupleGridOption.disabled = !getSelectedTuplet();
        if (!getSelectedTuplet() && clickGrid.value === "tuple") {
          clickGrid.value = "nominal";
        }
        syncTupleValueOptions();
        syncClickIntervalOptions();
      }

      function syncTupleValueOptions() {
        const { beats, beatUnit } = getTimeSignature();
        const options = Array.from(tupleValue.options);
        let selectedIsValid = false;

        options.forEach((option) => {
          const isValid = isUsableTupleValue(beats, beatUnit, option.value);
          option.disabled = !isValid;
          selectedIsValid = selectedIsValid || (option.selected && isValid);
        });

        if (!selectedIsValid) {
          const firstValidOption = options.find((option) => !option.disabled);
          if (firstValidOption) {
            tupleValue.value = firstValidOption.value;
          }
        }
      }

      function syncClickIntervalOptions() {
        const { beats, beatUnit } = getTimeSignature();
        const options = Array.from(clickInterval.options);
        let selectedIsValid = false;

        options.forEach((option) => {
          const isValid = isUsableClickInterval(beats, beatUnit, option.value);
          option.disabled = !isValid;
          selectedIsValid = selectedIsValid || (option.selected && isValid);
        });

        if (!selectedIsValid) {
          const firstValidOption = options.find((option) => !option.disabled);
          if (firstValidOption) {
            clickInterval.value = firstValidOption.value;
          }
        }
      }

      function getPattern() {
        syncTimeSignature();
        const { beats, beatUnit } = getTimeSignature();
        const displayDuration = tupleValue.value;
        const clickDuration = clickInterval.value;
        const quarterNotesPerBar = beats * (4 / beatUnit);
        const tupletValue = getSelectedTuplet();
        const events = getDisplayEvents(beats, beatUnit, displayDuration, tupletValue);
        const clickEvents = getClickEvents(beats, beatUnit, clickDuration, clickGrid.value === "tuple" ? tupletValue : null);
        const clickCount = clickEvents.length;
        return {
          beats,
          beatUnit,
          duration: displayDuration,
          clickDuration,
          tuplet: tupletValue,
          quarterNotesPerBar,
          events,
          clickEvents,
          clickCount,
          measureUnits: getMeasureUnits(beats, beatUnit),
        };
      }

      function getMeasureSeconds() {
        const pattern = getPattern();
        const secondsPerQuarter = 60 / Number(bpmInput.value);
        return pattern.quarterNotesPerBar * secondsPerQuarter;
      }

      function getBeamGroupSize(pattern) {
        if (pattern.duration === "q") {
          return 1;
        }

        const noteValue = Number(pattern.duration);
        const isCompoundEighth = pattern.beatUnit === 8 && pattern.beats % 3 === 0;
        const naturalGroupSize = pattern.tuplet || (isCompoundEighth ? (noteValue / 8) * 3 : noteValue / pattern.beatUnit);
        return Math.max(2, Math.min(pattern.events.filter((event) => event.isNote).length, Math.round(naturalGroupSize)));
      }

      function renderFallbackNotation(pattern) {
        const width = 760;
        const height = 220;
        const staffLeft = 76;
        const staffRight = 728;
        const staffTop = 80;
        const lineGap = 10;
        const noteY = staffTop + lineGap * 2;
        const stemHeight = 56;
        const notationRight = 660;
        const notationLeft = staffLeft + 50;
        const notationWidth = notationRight - notationLeft;
        const beamGroupSize = getBeamGroupSize(pattern);
        const beamCounts = {
          8: 1,
          16: 2,
          32: 3,
        };
        const beamCount = beamCounts[pattern.duration] || 0;
        const eventXs = pattern.events.map((event) => notationLeft + (event.startUnits / pattern.measureUnits) * notationWidth);
        const noteIndexes = pattern.events.reduce((indexes, event, index) => {
          return event.isNote ? indexes.concat(index) : indexes;
        }, []);
        const lines = Array.from({ length: 5 }, (_, index) => {
          const y = staffTop + index * lineGap;
          return `<line x1="${staffLeft}" y1="${y}" x2="${staffRight}" y2="${y}" stroke="#17191f" stroke-width="1"/>`;
        }).join("");

        const notes = pattern.events.map((event, index) => {
          const x = eventXs[index];
          if (!event.isNote) {
            return `<rect x="${x - 5}" y="${noteY - 20}" width="10" height="8" rx="1" fill="#17191f"/>`;
          }

          const stemX = x + 7;
          const stemTop = noteY - stemHeight;
          return `
            <ellipse cx="${x}" cy="${noteY}" rx="8.5" ry="6" fill="#17191f" transform="rotate(-18 ${x} ${noteY})"/>
            <line x1="${stemX}" y1="${noteY}" x2="${stemX}" y2="${stemTop}" stroke="#17191f" stroke-width="2"/>
          `;
        }).join("");

        let beams = "";
        if (beamGroupSize > 1 && beamCount > 0) {
          for (let start = 0; start < noteIndexes.length; start += beamGroupSize) {
            const groupIndexes = noteIndexes.slice(start, start + beamGroupSize);
            const group = groupIndexes.map((index) => eventXs[index]);
            if (group.length < 2) {
              continue;
            }

            const startX = group[0] + 7;
            const endX = group[group.length - 1] + 7;
            const beamY = noteY - stemHeight;
            beams += `<line x1="${startX}" y1="${beamY}" x2="${endX}" y2="${beamY}" stroke="#17191f" stroke-width="6" stroke-linecap="butt"/>`;

            if (beamCount === 2) {
              beams += `<line x1="${startX}" y1="${beamY + 9}" x2="${endX}" y2="${beamY + 9}" stroke="#17191f" stroke-width="5" stroke-linecap="butt"/>`;
            }

            if (beamCount === 3) {
              beams += `<line x1="${startX}" y1="${beamY + 9}" x2="${endX}" y2="${beamY + 9}" stroke="#17191f" stroke-width="5" stroke-linecap="butt"/>`;
              beams += `<line x1="${startX}" y1="${beamY + 17}" x2="${endX}" y2="${beamY + 17}" stroke="#17191f" stroke-width="4" stroke-linecap="butt"/>`;
            }

            if (pattern.tuplet && groupIndexes.length === pattern.tuplet) {
              beams += `<text x="${(startX + endX) / 2}" y="${beamY - 10}" fill="#17191f" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" text-anchor="middle">${pattern.tuplet}</text>`;
            }
          }
        }

        const playheadStart = eventXs[0];
        const playheadEnd = notationLeft + notationWidth;

        notation.innerHTML = `
          <svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="${pattern.beats}/${pattern.beatUnit} ${intervalLabels[pattern.duration]} notation">
            <rect class="playhead-bar" x="${playheadStart - 9}" y="${staffTop - 44}" width="18" height="116" rx="4" fill="#2471a3" fill-opacity="0.22"/>
            ${lines}
            <g fill="#17191f" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" text-anchor="middle">
              <text x="50" y="${staffTop + 18}">${pattern.beats}</text>
              <text x="50" y="${staffTop + 48}">${pattern.beatUnit}</text>
            </g>
            ${notes}
            ${beams}
          </svg>
        `;

        setPlayheadSpan(playheadStart, playheadEnd);
      }

      function setPlayheadSpan(startX, endX) {
        const bar = notation.querySelector(".playhead-bar");
        playhead = bar ? { bar, startX, endX } : null;

        if (playhead && isRunning) {
          playhead.bar.classList.add("is-running");
          updatePlayhead();
        }
      }

      function addPlayheadToRenderedSvg(tickables, pattern) {
        const svg = notation.querySelector("svg");
        const tickableXs = tickables.map((tickable) => tickable.getAbsoluteX()).filter(Number.isFinite);

        if (!svg || tickableXs.length === 0) {
          playhead = null;
          return;
        }

        const startX = tickableXs[0];
        const endX = 710;
        const bar = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bar.setAttribute("class", "playhead-bar");
        bar.setAttribute("x", String(startX - 9));
        bar.setAttribute("y", "26");
        bar.setAttribute("width", "18");
        bar.setAttribute("height", "126");
        bar.setAttribute("rx", "4");
        bar.setAttribute("fill", "#2471a3");
        bar.setAttribute("fill-opacity", "0.22");
        svg.insertBefore(bar, svg.firstChild);
        setPlayheadSpan(startX, endX);
      }

      function renderNotation() {
        notation.innerHTML = "";
        playhead = null;

        const pattern = getPattern();
        const tupletLabel = pattern.tuplet ? ` ${pattern.tuplet}-tuplets` : "";
        patternSummary.textContent = `${pattern.beats}/${pattern.beatUnit}, ${intervalLabels[pattern.duration]}${tupletLabel}`;

        const VF = getVexFlow();
        if (!VF) {
          renderFallbackNotation(pattern);
          return;
        }

        try {
          const renderer = new VF.Renderer(notation, VF.Renderer.Backends.SVG);
          renderer.resize(760, 220);

          const context = renderer.getContext();
          const stave = new VF.Stave(36, 50, 700);
          stave.addClef("treble").addTimeSignature(`${pattern.beats}/${pattern.beatUnit}`);
          stave.setContext(context).draw();

          const tickables = pattern.events.map((event) => {
            return new VF.StaveNote({
              clef: "treble",
              keys: ["b/4"],
              duration: event.isNote ? event.duration : `${event.duration}r`,
            });
          });

          const noteTickables = tickables.filter((tickable, index) => pattern.events[index].isNote);
          const renderedTuplets = [];
          if (pattern.tuplet) {
            for (let start = 0; start < noteTickables.length; start += pattern.tuplet) {
              const tupletNotes = noteTickables.slice(start, start + pattern.tuplet);
              if (tupletNotes.length === pattern.tuplet) {
                renderedTuplets.push(new VF.Tuplet(tupletNotes, {
                  num_notes: pattern.tuplet,
                  notes_occupied: 2,
                }));
              }
            }
          }

          const voice = new VF.Voice({
            num_beats: pattern.beats,
            beat_value: pattern.beatUnit,
          });

          voice.addTickables(tickables);
          new VF.Formatter().joinVoices([voice]).format([voice], 470);
          voice.draw(context, stave);

          VF.Beam.generateBeams(noteTickables).forEach((beam) => {
            beam.setContext(context).draw();
          });

          renderedTuplets.forEach((renderedTuplet) => renderedTuplet.setContext(context).draw());

          addPlayheadToRenderedSvg(tickables, pattern);
        } catch (error) {
          console.error(error);
          renderFallbackNotation(pattern);
        }
      }

      function syncBpm(value) {
        const bpm = clampBpm(value);
        bpmRange.value = bpm;
        bpmInput.value = bpm;
        bpmDisplay.textContent = bpm;
      }

      function restartRunningClock() {
        if (!isRunning || !audioContext) {
          return;
        }

        clickIndex = 0;
        nextClickTime = audioContext.currentTime + 0.06;
        measureStartTime = nextClickTime;
        updatePlayhead();
      }

      function playClick(time, accent) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.frequency.value = accent ? 1400 : 900;
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(accent ? 0.55 : 0.32, time + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.055);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(time);
        oscillator.stop(time + 0.065);
      }

      function updatePlayhead() {
        if (!isRunning || !playhead || !audioContext) {
          return;
        }

        const measureSeconds = getMeasureSeconds();
        const elapsed = Math.max(0, audioContext.currentTime - measureStartTime);
        const progress = (elapsed % measureSeconds) / measureSeconds;
        const x = playhead.startX + (playhead.endX - playhead.startX) * progress;
        playhead.bar.setAttribute("x", String(x - 9));
      }

      function animatePlayhead() {
        updatePlayhead();
        animationFrame = window.requestAnimationFrame(animatePlayhead);
      }

      function scheduleClicks() {
        const pattern = getPattern();
        const measureSeconds = getMeasureSeconds();
        const secondsPerUnit = measureSeconds / pattern.measureUnits;

        while (nextClickTime < audioContext.currentTime + 0.1) {
          const clickPosition = clickIndex % pattern.clickEvents.length;
          const clickEvent = pattern.clickEvents[clickPosition];
          const nextClickEvent = pattern.clickEvents[(clickPosition + 1) % pattern.clickEvents.length];
          const gapUnits = nextClickEvent.startUnits > clickEvent.startUnits
            ? nextClickEvent.startUnits - clickEvent.startUnits
            : pattern.measureUnits - clickEvent.startUnits + nextClickEvent.startUnits;
          playClick(nextClickTime, clickEvent.startUnits === 0);
          nextClickTime += gapUnits * secondsPerUnit;
          clickIndex += 1;
        }
      }

      async function start() {
        audioContext = audioContext || new AudioContext();
        await audioContext.resume();
        renderNotation();
        isRunning = true;
        clickIndex = 0;
        nextClickTime = audioContext.currentTime + 0.06;
        measureStartTime = nextClickTime;
        toggleButton.textContent = "Stop";
        toggleButton.classList.add("is-running");
        status.textContent = "Playing";
        if (playhead) {
          playhead.bar.classList.add("is-running");
          updatePlayhead();
        }
        schedulerTimer = window.setInterval(scheduleClicks, 25);
        animationFrame = window.requestAnimationFrame(animatePlayhead);
      }

      function stop() {
        isRunning = false;
        window.clearInterval(schedulerTimer);
        window.cancelAnimationFrame(animationFrame);
        if (playhead) {
          playhead.bar.classList.remove("is-running");
          playhead.bar.setAttribute("x", String(playhead.startX - 9));
        }
        toggleButton.textContent = "Start";
        toggleButton.classList.remove("is-running");
        status.textContent = "Ready";
      }

      function updateRhythm() {
        syncTimeSignature();
        renderNotation();
        restartRunningClock();
      }

      bpmRange.addEventListener("input", (event) => {
        syncBpm(event.target.value);
        restartRunningClock();
      });
      bpmInput.addEventListener("input", (event) => {
        syncBpm(event.target.value);
        restartRunningClock();
      });
      timeNumerator.addEventListener("input", updateRhythm);
      timeDenominator.addEventListener("change", updateRhythm);
      tuplet.addEventListener("change", updateRhythm);
      tupleValue.addEventListener("change", updateRhythm);
      clickInterval.addEventListener("change", updateRhythm);
      clickGrid.addEventListener("change", updateRhythm);
      toggleButton.addEventListener("click", async () => {
        if (isRunning) {
          stop();
        } else {
          try {
            await start();
          } catch (error) {
            console.error(error);
            stop();
            status.textContent = "Audio could not start";
          }
        }
      });

      syncBpm(100);
      syncTimeSignature();
      renderNotation();
    </script>
  </body>
</html>
