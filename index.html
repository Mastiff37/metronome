<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Metronome</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --ink: #17191f;
        --muted: #68707d;
        --line: #dfe3ea;
        --accent: #2471a3;
        --accent-strong: #155e88;
        --control: #f0f3f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 980px;
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 32px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 720;
        letter-spacing: 0;
      }

      .tempo-readout {
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-variant-numeric: tabular-nums;
      }

      .tempo-readout strong {
        font-size: 2rem;
        line-height: 1;
      }

      .tempo-readout span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      main {
        display: grid;
        grid-template-columns: minmax(600px, 1fr) 320px;
        gap: 24px;
        padding: 28px 32px 32px;
      }

      .notation-area,
      .controls {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .notation-area {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 480px;
      }

      .notation-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .notation-heading h2 {
        margin: 0;
        font-size: 1rem;
      }

      .notation-heading span {
        color: var(--muted);
        font-size: 0.9rem;
      }

      #notation {
        display: grid;
        min-height: 360px;
        padding: 26px 30px;
        place-items: center;
      }

      #notation svg {
        max-width: 100%;
        overflow: visible;
      }

      .controls {
        align-self: start;
        padding: 20px;
      }

      .control-group {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 650;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--control);
        color: var(--ink);
        padding: 0 12px;
      }

      input[type="range"] {
        height: 28px;
        padding: 0;
        accent-color: var(--accent);
      }

      .bpm-row {
        display: grid;
        grid-template-columns: 1fr 76px;
        gap: 10px;
        align-items: center;
      }

      .start-button {
        width: 100%;
        height: 52px;
        margin-top: 4px;
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-weight: 760;
      }

      .start-button:hover {
        background: var(--accent-strong);
      }

      .start-button.is-running {
        background: #a3342b;
      }

      .status {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Metronome</h1>
        <div class="tempo-readout" aria-live="polite">
          <strong id="bpmDisplay">100</strong>
          <span>BPM</span>
        </div>
      </header>

      <main>
        <section class="notation-area" aria-labelledby="notationTitle">
          <div class="notation-heading">
            <h2 id="notationTitle">Click Pattern</h2>
            <span id="patternSummary">4/4, eighth notes</span>
          </div>
          <div id="notation" aria-label="Notation preview"></div>
        </section>

        <aside class="controls" aria-label="Metronome controls">
          <div class="control-group">
            <label for="bpmRange">Tempo</label>
            <div class="bpm-row">
              <input id="bpmRange" type="range" min="40" max="240" value="100">
              <input id="bpmInput" type="number" min="40" max="240" value="100">
            </div>
          </div>

          <div class="control-group">
            <label for="timeSignature">Time Signature</label>
            <select id="timeSignature">
              <option value="4/4">4/4</option>
              <option value="3/4">3/4</option>
              <option value="2/4">2/4</option>
              <option value="6/8">6/8</option>
            </select>
          </div>

          <div class="control-group">
            <label for="clickInterval">Click Interval</label>
            <select id="clickInterval">
              <option value="q">Quarter notes</option>
              <option value="8" selected>Eighth notes</option>
              <option value="16">Sixteenth notes</option>
            </select>
          </div>

          <button class="start-button" id="toggleButton" type="button">Start</button>
          <div class="status" id="status">Ready</div>
        </aside>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.6/build/cjs/vexflow.js"></script>
    <script>
      const bpmRange = document.querySelector("#bpmRange");
      const bpmInput = document.querySelector("#bpmInput");
      const bpmDisplay = document.querySelector("#bpmDisplay");
      const timeSignature = document.querySelector("#timeSignature");
      const clickInterval = document.querySelector("#clickInterval");
      const notation = document.querySelector("#notation");
      const patternSummary = document.querySelector("#patternSummary");
      const toggleButton = document.querySelector("#toggleButton");
      const status = document.querySelector("#status");

      let audioContext;
      let schedulerTimer;
      let nextClickTime = 0;
      let clickIndex = 0;
      let isRunning = false;

      const intervalLabels = {
        q: "quarter notes",
        8: "eighth notes",
        16: "sixteenth notes",
      };

      function getVexFlow() {
        if (window.Vex && window.Vex.Flow) {
          return window.Vex.Flow;
        }

        if (window.VexFlow) {
          return window.VexFlow.Flow || window.VexFlow;
        }

        return null;
      }

      function clampBpm(value) {
        return Math.min(240, Math.max(40, Number.parseInt(value, 10) || 100));
      }

      function getPattern() {
        const [beats, beatUnit] = timeSignature.value.split("/").map(Number);
        const duration = clickInterval.value;
        const notesPerQuarter = duration === "q" ? 1 : Number(duration) / 4;
        const quarterNotesPerBar = beats * (4 / beatUnit);
        return {
          beats,
          beatUnit,
          duration,
          noteCount: Math.round(quarterNotesPerBar * notesPerQuarter),
        };
      }

      function getBeamGroupSize(pattern) {
        if (pattern.duration === "q") {
          return 1;
        }

        const noteValue = Number(pattern.duration);
        const isCompoundEighth = pattern.beatUnit === 8 && pattern.beats % 3 === 0;
        return isCompoundEighth ? (noteValue / 8) * 3 : noteValue / pattern.beatUnit;
      }

      function renderFallbackNotation(pattern) {
        const width = 720;
        const height = 220;
        const staffLeft = 76;
        const staffRight = 676;
        const staffTop = 80;
        const lineGap = 10;
        const noteY = staffTop + lineGap * 2;
        const stemHeight = 56;
        const noteSpacing = (staffRight - staffLeft - 50) / Math.max(1, pattern.noteCount - 1);
        const beamGroupSize = getBeamGroupSize(pattern);
        const beamCount = pattern.duration === "16" ? 2 : pattern.duration === "8" ? 1 : 0;
        const noteXs = Array.from({ length: pattern.noteCount }, (_, index) => staffLeft + 50 + index * noteSpacing);
        const lines = Array.from({ length: 5 }, (_, index) => {
          const y = staffTop + index * lineGap;
          return `<line x1="${staffLeft}" y1="${y}" x2="${staffRight}" y2="${y}" stroke="#17191f" stroke-width="1"/>`;
        }).join("");

        const notes = noteXs.map((x) => {
          const stemX = x + 7;
          const stemTop = noteY - stemHeight;
          return `
            <ellipse cx="${x}" cy="${noteY}" rx="8.5" ry="6" fill="#17191f" transform="rotate(-18 ${x} ${noteY})"/>
            <line x1="${stemX}" y1="${noteY}" x2="${stemX}" y2="${stemTop}" stroke="#17191f" stroke-width="2"/>
          `;
        }).join("");

        let beams = "";
        if (beamGroupSize > 1 && beamCount > 0) {
          for (let start = 0; start < noteXs.length; start += beamGroupSize) {
            const group = noteXs.slice(start, start + beamGroupSize);
            if (group.length < 2) {
              continue;
            }

            const startX = group[0] + 7;
            const endX = group[group.length - 1] + 7;
            const beamY = noteY - stemHeight;
            beams += `<line x1="${startX}" y1="${beamY}" x2="${endX}" y2="${beamY}" stroke="#17191f" stroke-width="6" stroke-linecap="butt"/>`;

            if (beamCount === 2) {
              beams += `<line x1="${startX}" y1="${beamY + 9}" x2="${endX}" y2="${beamY + 9}" stroke="#17191f" stroke-width="5" stroke-linecap="butt"/>`;
            }
          }
        }

        notation.innerHTML = `
          <svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="${timeSignature.value} ${intervalLabels[pattern.duration]} notation">
            ${lines}
            <text x="34" y="${staffTop + 31}" fill="#17191f" font-size="32" font-weight="700">${pattern.beats}</text>
            <text x="34" y="${staffTop + 60}" fill="#17191f" font-size="32" font-weight="700">${pattern.beatUnit}</text>
            ${notes}
            ${beams}
          </svg>
        `;
      }

      function renderNotation() {
        notation.innerHTML = "";

        const pattern = getPattern();
        patternSummary.textContent = `${timeSignature.value}, ${intervalLabels[pattern.duration]}`;

        const VF = getVexFlow();
        if (!VF) {
          renderFallbackNotation(pattern);
          return;
        }

        try {
          const renderer = new VF.Renderer(notation, VF.Renderer.Backends.SVG);
          renderer.resize(720, 220);

          const context = renderer.getContext();
          const stave = new VF.Stave(36, 50, 640);
          stave.addClef("treble").addTimeSignature(timeSignature.value);
          stave.setContext(context).draw();

          const notes = Array.from({ length: pattern.noteCount }, () => {
            return new VF.StaveNote({
              clef: "treble",
              keys: ["b/4"],
              duration: pattern.duration,
            });
          });

          const voice = new VF.Voice({
            num_beats: pattern.beats,
            beat_value: pattern.beatUnit,
          });

          voice.addTickables(notes);
          new VF.Formatter().joinVoices([voice]).format([voice], 500);
          voice.draw(context, stave);

          VF.Beam.generateBeams(notes).forEach((beam) => {
            beam.setContext(context).draw();
          });
        } catch (error) {
          console.error(error);
          renderFallbackNotation(pattern);
        }
      }

      function syncBpm(value) {
        const bpm = clampBpm(value);
        bpmRange.value = bpm;
        bpmInput.value = bpm;
        bpmDisplay.textContent = bpm;
      }

      function playClick(time, accent) {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.frequency.value = accent ? 1400 : 900;
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(accent ? 0.55 : 0.32, time + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.055);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(time);
        oscillator.stop(time + 0.065);
      }

      function scheduleClicks() {
        const pattern = getPattern();
        const secondsPerClick = 60 / Number(bpmInput.value) / (pattern.duration === "q" ? 1 : Number(pattern.duration) / 4);

        while (nextClickTime < audioContext.currentTime + 0.1) {
          playClick(nextClickTime, clickIndex % pattern.noteCount === 0);
          nextClickTime += secondsPerClick;
          clickIndex += 1;
        }
      }

      async function start() {
        audioContext = audioContext || new AudioContext();
        await audioContext.resume();
        isRunning = true;
        clickIndex = 0;
        nextClickTime = audioContext.currentTime + 0.06;
        toggleButton.textContent = "Stop";
        toggleButton.classList.add("is-running");
        status.textContent = "Playing";
        schedulerTimer = window.setInterval(scheduleClicks, 25);
      }

      function stop() {
        isRunning = false;
        window.clearInterval(schedulerTimer);
        toggleButton.textContent = "Start";
        toggleButton.classList.remove("is-running");
        status.textContent = "Ready";
      }

      bpmRange.addEventListener("input", (event) => syncBpm(event.target.value));
      bpmInput.addEventListener("input", (event) => syncBpm(event.target.value));
      timeSignature.addEventListener("change", renderNotation);
      clickInterval.addEventListener("change", renderNotation);
      toggleButton.addEventListener("click", async () => {
        if (isRunning) {
          stop();
        } else {
          try {
            await start();
          } catch (error) {
            console.error(error);
            stop();
            status.textContent = "Audio could not start";
          }
        }
      });

      syncBpm(100);
      renderNotation();
    </script>
  </body>
</html>
